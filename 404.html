<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-key="404.meta.title">Page Not Found · Neuroartan</title>
  <meta name="description" data-i18n-key="404.meta.description" content="This page is not currently available. Neuroartan is under construction and selected sections are still being connected.">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" href="/assets/icons/brand/logos/neuroartan/logo-plain.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/pages/404.css">
</head>
<body class="page-404">
  <main class="error404" aria-labelledby="error404-title">
    <section class="error404-shell">
      <div class="error404-mark">404</div>

      <div class="error404-copy">
        <p class="error404-eyebrow" data-i18n-key="404.eyebrow">Neuroartan</p>
        <h1 id="error404-title" class="error404-title" data-i18n-key="404.heading">This page is not available yet.</h1>
        <p class="error404-description" data-i18n-key="404.body.1">
          The page you tried to reach is currently under construction or has not yet been connected to the institutional navigation system.
        </p>
        <p class="error404-description" data-i18n-key="404.body.2">
          Please return to the homepage and continue from the currently active public sections.
        </p>
      </div>

      <div class="error404-actions" aria-label="404 recovery actions">
        <a href="/" class="error404-primary-link" data-404-home-link data-i18n-key="404.actions.home">Return to Homepage</a>
        <button type="button" class="error404-secondary-button" data-404-back-button data-i18n-key="404.actions.back">Go Back</button>
      </div>
    </section>
  </main>

  <script src="/assets/js/i18n/translation.js" defer></script>
  <script src="/assets/js/i18n/country-language.js" defer></script>
  <script src="/assets/js/pages/404.js" defer></script>
</body>
</html>
