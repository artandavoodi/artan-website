<!-- =============================================================================
     01) MODEL PROFILE LINK PANEL
============================================================================= -->
<section class="model-creation-panel model-creation-panel--profile-link" data-model-creation-panel="profile-link">
  <header class="model-creation-panel__header">
    <p class="model-creation-panel__eyebrow">Profile Linkage</p>
    <h2 class="model-creation-panel__title">Owner profile and route readiness</h2>
    <p class="model-creation-panel__copy">Models must stay linked to the authenticated profile record and never become anonymous static artifacts.</p>
  </header>

  <div class="model-creation-panel__cards" data-model-profile-link-state>
    <article class="model-creation-card">
      <span class="model-creation-card__label">Profile</span>
      <strong class="model-creation-card__value" data-model-profile-name>Resolving</strong>
      <p class="model-creation-card__copy" data-model-profile-status>Waiting for profile runtime.</p>
    </article>
    <article class="model-creation-card">
      <span class="model-creation-card__label">Username</span>
      <strong class="model-creation-card__value" data-model-profile-username>@pending</strong>
      <p class="model-creation-card__copy">Canonical model save requires profile identity and username readiness.</p>
    </article>
  </div>
</section>
