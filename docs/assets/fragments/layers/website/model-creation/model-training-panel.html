<!-- =============================================================================
     01) MODEL TRAINING PANEL
============================================================================= -->
<section class="model-creation-panel model-creation-panel--training" data-model-creation-panel="training">
  <header class="model-creation-panel__header">
    <p class="model-creation-panel__eyebrow">Training</p>
    <h2 class="model-creation-panel__title">Training workflow visibility</h2>
    <p class="model-creation-panel__copy">Track the training stage honestly while backend ingestion and fine-tuning remain adapter-ready.</p>
  </header>

  <label class="model-creation-field">
    <span>Training stage</span>
    <select class="model-creation-field__control" name="training_stage" data-model-field="training_stage" data-training-stage-select></select>
  </label>

  <div class="model-creation-panel__list" data-training-stage-list></div>
</section>
