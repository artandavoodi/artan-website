<!-- =============================================================================
     01) MODEL VERSIONING PANEL
============================================================================= -->
<section class="model-creation-panel model-creation-panel--versioning" data-model-creation-panel="versioning">
  <header class="model-creation-panel__header">
    <p class="model-creation-panel__eyebrow">Versioning</p>
    <h2 class="model-creation-panel__title">Release and change state</h2>
    <p class="model-creation-panel__copy">Keep model drafts versioned before deployment, publication, or training-state promotion.</p>
  </header>

  <div class="model-creation-panel__grid">
    <label class="model-creation-field">
      <span>Version</span>
      <input class="model-creation-field__control" name="release_version" data-model-field="release_version" type="text">
    </label>
    <label class="model-creation-field model-creation-field--full">
      <span>Version notes</span>
      <textarea class="model-creation-field__control" name="version_notes" data-model-field="version_notes" rows="4"></textarea>
    </label>
  </div>
</section>
