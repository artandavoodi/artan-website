<!-- =============================================================================
     01) MODEL SAFETY AND VISIBILITY PANEL
============================================================================= -->
<section class="model-creation-panel model-creation-panel--safety" data-model-creation-panel="safety">
  <header class="model-creation-panel__header">
    <p class="model-creation-panel__eyebrow">Safety</p>
    <h2 class="model-creation-panel__title">Visibility, trust, and public readiness</h2>
    <p class="model-creation-panel__copy">Public interaction remains gated by readiness, verification, and safety state.</p>
  </header>

  <div class="model-creation-panel__grid">
    <label class="model-creation-field">
      <span>Safety state</span>
      <select class="model-creation-field__control" name="safety_state" data-model-field="safety_state" data-safety-state-select></select>
    </label>
    <label class="model-creation-field">
      <span>Public readiness</span>
      <select class="model-creation-field__control" name="public_readiness" data-model-field="public_readiness" data-public-readiness-select></select>
    </label>
    <label class="model-creation-field model-creation-field--full">
      <span>Safety notes</span>
      <textarea class="model-creation-field__control" name="safety_notes" data-model-field="safety_notes" rows="4"></textarea>
    </label>
  </div>
</section>
