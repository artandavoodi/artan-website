<section class="model-creation" data-model-creation-shell aria-labelledby="model-creation-title">
  <header class="model-creation__header">
    <p class="model-creation__eyebrow">Model Creation</p>
    <h1 class="model-creation__title" id="model-creation-title">Design and train a profile-linked cognitive model</h1>
    <p class="model-creation__description">
      Create the governed model record, prepare provider routing, collect voice/style/memory intake, and preserve deployment readiness without claiming unfinished backend training.
    </p>
  </header>

  <div class="model-creation__layout">
    <nav class="model-creation__nav" data-model-creation-nav aria-label="Model creation panels"></nav>

    <form class="model-creation__form" data-model-creation-form>
      <div class="model-creation__panels" data-model-creation-panels></div>

      <footer class="model-creation__footer">
        <p class="model-creation__status" data-model-creation-status aria-live="polite">Loading model creation control surface.</p>
        <button class="model-creation__button" type="submit" data-model-creation-save>Save Model Draft</button>
      </footer>
    </form>
  </div>
</section>
