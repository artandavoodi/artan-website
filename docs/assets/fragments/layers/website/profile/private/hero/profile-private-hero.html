<!-- =============================================================================
     01) PRIVATE PROFILE HERO
     02) PROFILE IDENTITY SUMMARY
     03) PROFILE PRIMARY ACTIONS
============================================================================= -->
<section class="profile-private-hero" data-profile-private-hero aria-labelledby="profile-private-hero-title">
  <div class="profile-private-hero__surface">
    <div class="profile-private-hero__identity">
      <div class="profile-private-hero__avatar" data-profile-avatar aria-hidden="true">
        <span class="profile-private-hero__avatar-initials" data-profile-avatar-initials>NA</span>
      </div>

      <div class="profile-private-hero__copy">
        <p class="profile-private-hero__eyebrow">Private Profile</p>
        <h1 class="profile-private-hero__title" id="profile-private-hero-title" data-profile-display-name>Profile not completed</h1>
        <p class="profile-private-hero__meta" data-profile-username>@username pending</p>
        <p class="profile-private-hero__description" data-profile-hero-description>
          Complete your private identity layer before activating public profile, organizations, models, or workspace access.
        </p>
      </div>
    </div>

    <div class="profile-private-hero__actions" aria-label="Profile actions">
      <button class="profile-private-hero__button profile-private-hero__button--primary" type="button" data-profile-action="complete-profile">
        Complete profile
      </button>
      <button class="profile-private-hero__button profile-private-hero__button--secondary" type="button" data-profile-action="edit-identity">
        Edit identity
      </button>
    </div>
  </div>
</section>
