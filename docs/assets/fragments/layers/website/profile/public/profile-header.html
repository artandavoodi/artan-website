<!-- =============================================================================
     01) PUBLIC PROFILE HEADER
============================================================================= -->
<section class="profile-header" data-profile-header data-profile-surface="public" aria-label="Public profile header">
  <div class="profile-header__surface">
    <div class="profile-header__identity-block">
      <div class="profile-header__avatar-shell">
        <div class="profile-header__avatar-surface ui-surface">
          <span class="profile-header__avatar-placeholder">NP</span>
        </div>
      </div>

      <div class="profile-header__copy">
        <div class="profile-header__eyebrow-row">
          <span class="ui-badge ui-badge--outline">Public Profile</span>
          <p class="profile-header__state-line">Company-domain public route scaffold</p>
        </div>

        <div class="profile-header__identity">
          <h1 class="profile-header__display-name">Public Identity</h1>
          <div class="profile-header__identity-line">
            <p class="profile-header__username">@username</p>
            <span class="profile-header__identity-separator" aria-hidden="true">•</span>
            <p class="profile-header__route">neuroartan.com/username</p>
          </div>
        </div>

        <p class="profile-header__summary">The public company-domain profile route remains a distinct future rendering surface and is scaffolded separately from the private owner environment.</p>
      </div>
    </div>
  </div>
</section>
