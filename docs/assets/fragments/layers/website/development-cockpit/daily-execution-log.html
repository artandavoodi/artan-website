<!-- =============================================================================
     01) DAILY EXECUTION LOG MODULE
     02) LOCAL CONTINUITY CAPTURE
     03) LOG OUTPUT
============================================================================= -->
<article class="cockpit-module daily-execution-log" data-cockpit-module="daily-execution-log">
  <header class="cockpit-module__header">
    <p class="cockpit-module__eyebrow">Daily Execution Log</p>
    <h3 class="cockpit-module__title">Capture local continuity notes</h3>
  </header>
  <form class="cockpit-module__form" data-daily-log-form>
    <label class="cockpit-field">
      <span>Entry</span>
      <textarea name="entry" rows="4" placeholder="Record what changed, what remains blocked, and the next owner file."></textarea>
    </label>
    <button class="cockpit-button cockpit-button--primary" type="submit">Add local entry</button>
  </form>
  <div class="daily-execution-log__entries" data-daily-log-entries></div>
</article>
