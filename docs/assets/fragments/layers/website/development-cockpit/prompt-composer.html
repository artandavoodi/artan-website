<!-- =============================================================================
     01) PROMPT COMPOSER MODULE
     02) DATA-DRIVEN TEMPLATE CONTROLS
     03) GENERATED PROMPT OUTPUT
============================================================================= -->
<article class="cockpit-module prompt-composer" data-cockpit-module="prompt-composer">
  <header class="cockpit-module__header">
    <p class="cockpit-module__eyebrow">Prompt Composer</p>
    <h3 class="cockpit-module__title">Generate owner-correct execution prompts</h3>
  </header>
  <form class="cockpit-module__form" data-prompt-composer-form>
    <label class="cockpit-field">
      <span>Template</span>
      <select name="template" data-prompt-template-select></select>
    </label>
    <label class="cockpit-field">
      <span>Scope</span>
      <input name="scope" type="text" placeholder="docs/assets/js/layers/website/system/profile-save.js">
    </label>
    <label class="cockpit-field">
      <span>Objective</span>
      <textarea name="objective" rows="3" placeholder="Fix the profile media persistence owner without duplicate runtime logic."></textarea>
    </label>
    <label class="cockpit-field">
      <span>Verification</span>
      <input name="verification" type="text" placeholder="node --check target file and browser review">
    </label>
    <button class="cockpit-button cockpit-button--primary" type="submit">Generate prompt</button>
  </form>
  <output class="cockpit-output" data-prompt-composer-output>Choose a template and generate an execution prompt.</output>
</article>
