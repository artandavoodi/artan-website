<!-- =============================================================================
     HOME SIDEBAR FRAGMENT
     Purpose: primary left-side navigation shell for the homepage/dashboard layer.
     Notes:
     - distinct from institutional menu ownership
     - hidden by default and opened from the home topbar
     - supports navigation, quick actions, and continuity access
============================================================================= -->

<aside class="home-sidebar" id="home-sidebar" aria-label="Home sidebar" hidden>
  <div class="home-sidebar__inner">
    <div class="home-sidebar__header">
      <div class="home-sidebar__heading-group">
        <p class="home-sidebar__eyebrow">Navigation</p>
        <h2 class="home-sidebar__title">Website surfaces and continuity access</h2>
      </div>

      <button
        class="home-sidebar__close global-close-button"
        id="home-sidebar-close"
        type="button"
        aria-label="Close navigation panel">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </div>

    <nav class="home-sidebar__nav" aria-label="Home sidebar navigation">
      <a class="home-sidebar__nav-link home-sidebar__nav-link--active" href="/" aria-current="page">
        <span class="home-sidebar__item-icon" aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/navigation/unclassified/home.svg" alt=""></span>
        <span class="home-sidebar__item-label">Home</span>
      </a>
      <a class="home-sidebar__nav-link" href="/pages/about/">
        <span class="home-sidebar__item-label">About</span>
      </a>
      <a class="home-sidebar__nav-link" href="/pages/profiles/index.html">
        <span class="home-sidebar__item-icon" aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/identity/unclassified/profiles.svg" alt=""></span>
        <span class="home-sidebar__item-label">Models</span>
      </a>
      <a class="home-sidebar__nav-link" href="/pages/knowledge-research/index.html">
        <span class="home-sidebar__item-label">Knowledge</span>
      </a>
      <a class="home-sidebar__nav-link" href="/pages/updates/index.html">
        <span class="home-sidebar__item-label">Updates</span>
      </a>
    </nav>

    <section class="home-sidebar__section" aria-label="Core surfaces">
      <p class="home-sidebar__section-title">Core surfaces</p>
      <div class="home-sidebar__stack">
        <button class="home-sidebar__stack-item" data-home-sidebar-action="profile" type="button">
          <span class="home-sidebar__item-icon" aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/identity/unclassified/profile.svg" alt=""></span>
          <span class="home-sidebar__item-label">Private profile</span>
        </button>
        <button class="home-sidebar__stack-item" data-home-sidebar-action="saved-continuities" type="button">
          <span class="home-sidebar__item-icon" aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/cognition/unclassified/continuity.svg" alt=""></span>
          <span class="home-sidebar__item-label">Continuity trace</span>
        </button>
        <button class="home-sidebar__stack-item" data-home-sidebar-action="recent-interactions" type="button">
          <span class="home-sidebar__item-label">Recent interaction</span>
        </button>
      </div>
    </section>

    <section class="home-sidebar__section" aria-label="Quick actions">
      <p class="home-sidebar__section-title">Quick actions</p>
      <div class="home-sidebar__stack">
        <button class="home-sidebar__stack-item" data-home-sidebar-action="account-entry" type="button">
          <span class="home-sidebar__item-icon" aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/identity/unclassified/profile.svg" alt=""></span>
          <span class="home-sidebar__item-label">Create private profile</span>
        </button>
        <button class="home-sidebar__stack-item" data-home-sidebar-action="open-search" type="button">
          <span class="home-sidebar__item-icon" aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/actions/unclassified/search.svg" alt=""></span>
          <span class="home-sidebar__item-label">Search knowledge</span>
        </button>
        <button class="home-sidebar__stack-item" data-home-sidebar-action="settings" type="button">
          <span class="home-sidebar__item-icon" aria-hidden="true"><img class="ui-icon-theme-aware" src="/assets/icons/core/system/unclassified/settings.svg" alt=""></span>
          <span class="home-sidebar__item-label">Open settings</span>
        </button>
      </div>
    </section>
  </div>
</aside>
