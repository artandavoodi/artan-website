<section class="developer-mode-settings-panel-section developer-mode-settings-panel-section--notifications" aria-label="Notifications section">
  <header class="developer-mode-settings-panel-section__header">
    <p class="developer-mode-settings-panel-section__eyebrow">Notifications</p>
    <h4 class="developer-mode-settings-panel-section__title">Developer notifications</h4>
    <p class="developer-mode-settings-panel-section__copy">Choose which developer runtime events should surface inside the platform shell.</p>
  </header>

  <div class="developer-mode-settings-panel-section__body">
    <div class="developer-mode-settings-card">
      <div class="ui-settings-row">
        <div class="ui-settings-row__copy"><p class="ui-settings-row__title">Provider readiness</p><p class="ui-settings-row__description">Notify when provider state changes.</p></div>
        <div class="ui-settings-row__control"><span class="developer-mode-settings-pill">On</span></div>
      </div>
      <div class="ui-settings-row">
        <div class="ui-settings-row__copy"><p class="ui-settings-row__title">Approval gates</p><p class="ui-settings-row__description">Notify when mutation approval is required.</p></div>
        <div class="ui-settings-row__control"><span class="developer-mode-settings-pill">On</span></div>
      </div>
    </div>
  </div>
</section>
