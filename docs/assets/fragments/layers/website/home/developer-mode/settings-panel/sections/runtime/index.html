<section class="developer-mode-settings-panel-section developer-mode-settings-panel-section--runtime" aria-label="Runtime section">
  <header class="developer-mode-settings-panel-section__header">
    <p class="developer-mode-settings-panel-section__eyebrow">Runtime</p>
    <h4 class="developer-mode-settings-panel-section__title">Backend interfaces</h4>
    <p class="developer-mode-settings-panel-section__copy">Inspect developer-mode API routes, provider readiness, model discovery, chat execution, repository scan, patch proposal, testing, and commit gates.</p>
  </header>

  <div class="developer-mode-settings-panel-section__body">
    <div class="developer-mode-settings-card developer-mode-settings-grid">
      <div>
        <p class="developer-mode-settings-metric__label">Active provider</p>
        <p class="developer-mode-settings-metric__value" data-developer-mode-settings-output="active-provider">Not configured</p>
      </div>
      <div>
        <p class="developer-mode-settings-metric__label">Active model</p>
        <p class="developer-mode-settings-metric__value" data-developer-mode-settings-output="active-model">Not selected</p>
      </div>
      <div>
        <p class="developer-mode-settings-metric__label">Runtime persistence</p>
        <p class="developer-mode-settings-metric__value" data-developer-mode-settings-output="runtime-persistence">Server session pending</p>
      </div>
    </div>

    <div class="developer-mode-settings-list" data-developer-mode-settings-list="runtime-interfaces"></div>
  </div>
</section>
