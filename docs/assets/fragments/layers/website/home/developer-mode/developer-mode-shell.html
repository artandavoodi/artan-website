     NEUROARTAN · HOME DEVELOPER MODE · SHELL
     -----------------------------------------------------------------------------
     Purpose: Homepage-routed Developer Console shell. Topbar ownership remains
     delegated to the existing Developer topbar fragment.
============================================================================= -->

<!-- =============================================================================
     00) FILE INDEX
     -----------------------------------------------------------------------------
     01) DEVELOPER CONSOLE SHELL
     02) DEVELOPER MODE TOPBAR MOUNT
     03) DEVELOPER MODE SOVEREIGN VIEWPORT
     04) LEFT UTILITY SLOT
     05) CENTER WORKSPACE SLOT
     06) RIGHT CONTEXT SLOT
     07) END OF FILE
============================================================================= -->

<!-- =============================================================================
     01) DEVELOPER CONSOLE SHELL
============================================================================= -->
<section class="home-developer-mode-shell" data-home-developer-mode-root data-home-developer-mode-shell hidden aria-hidden="true" aria-label="Developer Console workspace">
  <!-- =============================================================================
       02) DEVELOPER MODE TOPBAR MOUNT
  ============================================================================= -->
  <header class="home-developer-mode-shell__topbar" data-home-developer-mode-topbar data-home-developer-region="topbar" data-include="home-developer-mode-topbar" aria-label="Developer Console topbar"></header>
  <section class="home-developer-mode-shell__settings-panel developer-mode-settings-panel-shell" data-developer-mode-settings-shell data-home-developer-mode-region="settings-panel" data-include="home-developer-mode-settings-panel-shell" hidden aria-hidden="true">
    <div class="developer-mode-settings-panel-shell__overlay" data-developer-mode-settings-overlay hidden aria-hidden="true"></div>

    <div class="developer-mode-settings-panel-shell__surface" data-developer-mode-settings-panel>
      <div class="developer-mode-settings-panel-shell__sections" data-developer-mode-settings-sections>
        <div class="developer-mode-settings-panel-shell__section" data-developer-mode-settings-section="overview" data-include="home-developer-mode-settings-panel-overview"></div>
        <div class="developer-mode-settings-panel-shell__section" data-developer-mode-settings-section="environments" data-include="home-developer-mode-settings-panel-environments"></div>
        <div class="developer-mode-settings-panel-shell__section" data-developer-mode-settings-section="connectors" data-include="home-developer-mode-settings-panel-connectors"></div>
        <div class="developer-mode-settings-panel-shell__section" data-developer-mode-settings-section="analytics" data-include="home-developer-mode-settings-panel-analytics"></div>
        <div class="developer-mode-settings-panel-shell__section" data-developer-mode-settings-section="data-control" data-include="home-developer-mode-settings-panel-data-control"></div>
        <div class="developer-mode-settings-panel-shell__section" data-developer-mode-settings-section="privacy" data-include="home-developer-mode-settings-panel-privacy"></div>
        <div class="developer-mode-settings-panel-shell__section" data-developer-mode-settings-section="runtime" data-include="home-developer-mode-settings-panel-runtime"></div>
        <div class="developer-mode-settings-panel-shell__section" data-developer-mode-settings-section="approvals" data-include="home-developer-mode-settings-panel-approvals"></div>
        <div class="developer-mode-settings-panel-shell__section" data-developer-mode-settings-section="logs-history" data-include="home-developer-mode-settings-panel-logs-history"></div>
        <div class="developer-mode-settings-panel-shell__section" data-developer-mode-settings-section="notifications" data-include="home-developer-mode-settings-panel-notifications"></div>
        <div class="developer-mode-settings-panel-shell__section" data-developer-mode-settings-section="security-access" data-include="home-developer-mode-settings-panel-security-access"></div>
        <div class="developer-mode-settings-panel-shell__section" data-developer-mode-settings-section="provider-model" data-include="home-developer-mode-settings-panel-provider-model"></div>
        <div class="developer-mode-settings-panel-shell__section" data-developer-mode-settings-section="workspace-project-bindings" data-include="home-developer-mode-settings-panel-workspace-project-bindings"></div>
      </div>
    </div>
  </section>

  <!-- =============================================================================
       03) DEVELOPER MODE SOVEREIGN VIEWPORT
  ============================================================================= -->
  <div class="home-developer-mode-shell__viewport" data-home-developer-viewport>
    <div class="home-developer-mode-shell__workspace" data-home-developer-workspace-grid>
      <!-- =============================================================================
           04) LEFT UTILITY SLOT
      ============================================================================= -->
      <aside class="home-developer-mode-shell__slot home-developer-mode-shell__slot--left" data-home-developer-slot="left" aria-label="Developer utility slot"></aside>

      <!-- =============================================================================
           05) CENTER WORKSPACE SLOT
      ============================================================================= -->
      <main class="home-developer-mode-shell__slot home-developer-mode-shell__slot--center" data-home-developer-slot="center" aria-label="Developer workspace slot"></main>

      <!-- =============================================================================
           06) RIGHT CONTEXT SLOT
      ============================================================================= -->
      <aside class="home-developer-mode-shell__slot home-developer-mode-shell__slot--right" data-home-developer-slot="right" aria-label="Developer context slot"></aside>
    </div>
  </div>
</section>

<!-- =============================================================================
     07) END OF FILE
============================================================================= -->
