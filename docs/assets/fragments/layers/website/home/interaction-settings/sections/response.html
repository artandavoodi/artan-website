<!-- =============================================================================
     01) RESPONSE SECTION ROOT
============================================================================= -->
<section class="home-interaction-settings-panel__section" data-home-interaction-settings-section="response" aria-label="Response behavior">
  <!-- =============================================================================
       02) RESPONSE SUMMARY
  ============================================================================= -->
  <div class="home-interaction-settings-panel__section-heading">
    <p class="home-interaction-settings-panel__section-title">Response behavior</p>
    <p class="home-interaction-settings-panel__status">Control how responses are displayed, copied, spoken, and prepared for long-form reading.</p>
  </div>

  <!-- =============================================================================
       03) RESPONSE OUTPUT MODE
  ============================================================================= -->
  <div class="home-interaction-settings-panel__option-grid" role="group" aria-label="Response output mode">
    <button class="home-interaction-settings-panel__option" type="button" data-home-interaction-setting="response-mode" data-home-interaction-setting-value="text" aria-pressed="true">
      <span class="home-interaction-settings-panel__option-label">Text</span>
      <span class="home-interaction-settings-panel__option-description">Keep responses written in the interaction panel.</span>
    </button>
    <button class="home-interaction-settings-panel__option" type="button" data-home-interaction-setting="response-mode" data-home-interaction-setting-value="voice" aria-pressed="false">
      <span class="home-interaction-settings-panel__option-label">Voice</span>
      <span class="home-interaction-settings-panel__option-description">Use spoken output when a voice engine is connected.</span>
    </button>
    <button class="home-interaction-settings-panel__option" type="button" data-home-interaction-setting="response-mode" data-home-interaction-setting-value="hybrid" aria-pressed="false">
      <span class="home-interaction-settings-panel__option-label">Hybrid</span>
      <span class="home-interaction-settings-panel__option-description">Prepare text and voice response behavior together.</span>
    </button>
  </div>

  <!-- =============================================================================
       04) RESPONSE CONTROLS
  ============================================================================= -->
  <div class="home-interaction-settings-panel__option-stack" aria-label="Response controls">
    <button class="home-interaction-settings-panel__toggle-row" type="button" data-home-interaction-setting="copy-message" data-home-interaction-setting-value="enabled" aria-pressed="true">
      <span class="home-interaction-settings-panel__toggle-copy">
        <span class="home-interaction-settings-panel__toggle-label">Copy message control</span>
        <span class="home-interaction-settings-panel__toggle-description">Show copy controls on generated responses.</span>
      </span>
      <span class="home-interaction-settings-panel__toggle" aria-hidden="true"></span>
    </button>
    <button class="home-interaction-settings-panel__toggle-row" type="button" data-home-interaction-setting="response-scroll" data-home-interaction-setting-value="enabled" aria-pressed="true">
      <span class="home-interaction-settings-panel__toggle-copy">
        <span class="home-interaction-settings-panel__toggle-label">Contained scrolling</span>
        <span class="home-interaction-settings-panel__toggle-description">Keep long responses inside the governed response panel.</span>
      </span>
      <span class="home-interaction-settings-panel__toggle" aria-hidden="true"></span>
    </button>
  </div>
</section>
