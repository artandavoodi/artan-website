<!-- =============================================================================

============================================================================= -->
<section class="home-interaction-settings-panel__section" data-home-interaction-settings-section="model" aria-label="Model routing">
  <!-- =============================================================================
       02) MODEL ROUTING SUMMARY
  ============================================================================= -->
  <div class="home-interaction-settings-panel__section-heading">
    <p class="home-interaction-settings-panel__section-title">Model routing</p>
    <p class="home-interaction-settings-panel__status">Choose how the platform should prefer model execution when local, cloud, or automatic routes are available.</p>
  </div>

  <!-- =============================================================================
       03) MODEL SOURCE OPTIONS
  ============================================================================= -->
  <div class="home-interaction-settings-panel__option-grid" role="group" aria-label="Model source preference">
    <button class="home-interaction-settings-panel__option" type="button" data-home-interaction-setting="model-source" data-home-interaction-setting-value="auto" aria-pressed="true">
      <span class="home-interaction-settings-panel__option-label">Auto</span>
      <span class="home-interaction-settings-panel__option-description">Use the best available model route.</span>
    </button>
    <button class="home-interaction-settings-panel__option" type="button" data-home-interaction-setting="model-source" data-home-interaction-setting-value="local" aria-pressed="false">
      <span class="home-interaction-settings-panel__option-label">Local</span>
      <span class="home-interaction-settings-panel__option-description">Prefer local runtime routes such as Ollama.</span>
    </button>
    <button class="home-interaction-settings-panel__option" type="button" data-home-interaction-setting="model-source" data-home-interaction-setting-value="cloud" aria-pressed="false">
      <span class="home-interaction-settings-panel__option-label">Cloud</span>
      <span class="home-interaction-settings-panel__option-description">Prefer connected cloud providers.</span>
    </button>
  </div>

  <!-- =============================================================================
       04) MODEL RUNTIME STATUS
  ============================================================================= -->
  <div class="home-interaction-settings-panel__option-stack" aria-label="Model runtime status">
    <p class="home-interaction-settings-panel__status">Local runtime, Hugging Face routing, cloud provider selection, and model health checks will be connected through the model runtime layer.</p>
  </div>
</section>
