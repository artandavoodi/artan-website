<!-- =============================================================================
     01) ACCESSIBILITY SECTION ROOT
============================================================================= -->
<section class="home-interaction-settings-panel__section" data-home-interaction-settings-section="accessibility" aria-label="Accessibility">
  <!-- =============================================================================
       02) ACCESSIBILITY SUMMARY
  ============================================================================= -->
  <div class="home-interaction-settings-panel__section-heading">
    <p class="home-interaction-settings-panel__section-title">Accessibility</p>
    <p class="home-interaction-settings-panel__status">Adjust motion, reading comfort, response assistance, and future accessibility controls for the interaction surface.</p>
  </div>

  <!-- =============================================================================
       03) MOTION CONTROLS
  ============================================================================= -->
  <div class="home-interaction-settings-panel__option-stack" aria-label="Motion controls">
    <button class="home-interaction-settings-panel__toggle-row" type="button" data-home-interaction-setting="reduced-motion" data-home-interaction-setting-value="disabled" aria-pressed="false">
      <span class="home-interaction-settings-panel__toggle-copy">
        <span class="home-interaction-settings-panel__toggle-label">Reduce motion</span>
        <span class="home-interaction-settings-panel__toggle-description">Limit stage motion, circle animation, and transition intensity.</span>
      </span>
      <span class="home-interaction-settings-panel__toggle" aria-hidden="true"></span>
    </button>
  </div>

  <!-- =============================================================================
       04) READING CONTROLS
  ============================================================================= -->
  <div class="home-interaction-settings-panel__option-grid" role="group" aria-label="Reading comfort">
    <button class="home-interaction-settings-panel__option" type="button" data-home-interaction-setting="reading-density" data-home-interaction-setting-value="standard" aria-pressed="true">
      <span class="home-interaction-settings-panel__option-label">Standard</span>
      <span class="home-interaction-settings-panel__option-description">Use the default premium response spacing.</span>
    </button>
    <button class="home-interaction-settings-panel__option" type="button" data-home-interaction-setting="reading-density" data-home-interaction-setting-value="expanded" aria-pressed="false">
      <span class="home-interaction-settings-panel__option-label">Expanded</span>
      <span class="home-interaction-settings-panel__option-description">Increase response spacing for longer reading sessions.</span>
    </button>
    <button class="home-interaction-settings-panel__option" type="button" data-home-interaction-setting="reading-density" data-home-interaction-setting-value="compact" aria-pressed="false">
      <span class="home-interaction-settings-panel__option-label">Compact</span>
      <span class="home-interaction-settings-panel__option-description">Reduce response spacing for dense work sessions.</span>
    </button>
  </div>
</section>
